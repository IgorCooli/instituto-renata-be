<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" font-family="system-ui, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="560" height="420" fill="#f8fafc"/>
  <text x="280" y="36" text-anchor="middle" font-size="17" font-weight="600" fill="#0f172a">Clean Architecture</text>
  <text x="280" y="56" text-anchor="middle" font-size="12" fill="#475569">com.institutorenata.api  dependęncias para dentro (domínio no centro)</text>

  <!-- entrypoint -->
  <rect x="160" y="78" width="240" height="64" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="280" y="108" text-anchor="middle" font-size="15" font-weight="600" fill="#1e3a8a">entrypoint</text>
  <text x="280" y="128" text-anchor="middle" font-size="11" fill="#1d4ed8">REST · @RestController · HTTP ’ casos de uso</text>

  <!-- domain -->
  <ellipse cx="280" cy="228" rx="132" ry="78" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="280" y="218" text-anchor="middle" font-size="15" font-weight="600" fill="#312e81">domain</text>
  <text x="280" y="238" text-anchor="middle" font-size="11" fill="#4338ca">entidades · port.in · port.out · usecase</text>

  <!-- dataprovider -->
  <rect x="160" y="314" width="240" height="64" rx="10" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
  <text x="280" y="344" text-anchor="middle" font-size="15" font-weight="600" fill="#134e4a">dataprovider</text>
  <text x="280" y="364" text-anchor="middle" font-size="11" fill="#0f766e">JPA · JDBC · integraçőes · implementa port.out</text>

  <!-- config -->
  <rect x="416" y="120" width="120" height="200" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="476" y="150" text-anchor="middle" font-size="14" font-weight="600" fill="#92400e">config</text>
  <text x="476" y="175" text-anchor="middle" font-size="10" fill="#b45309">@SpringBoot-</text>
  <text x="476" y="190" text-anchor="middle" font-size="10" fill="#b45309">Application</text>
  <text x="476" y="215" text-anchor="middle" font-size="10" fill="#b45309">@Configuration</text>
  <text x="476" y="240" text-anchor="middle" font-size="10" fill="#b45309">beans ·</text>
  <text x="476" y="255" text-anchor="middle" font-size="10" fill="#b45309">composition</text>

  <!-- arrows: entrypoint -> domain -->
  <line x1="280" y1="142" x2="280" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- domain -> dataprovider (logical flow) -->
  <line x1="280" y1="306" x2="280" y2="314" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- config to side hint -->
  <line x1="416" y1="220" x2="392" y2="220" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3"/>
</svg>
